name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Build artifact upload + Pages deploy need these.
permissions:
  contents: read
  pages: write
  id-token: write

# Cancel an in-flight deploy if a newer one is queued.
concurrency:
  group: pages
  cancel-in-progress: false

# Silence the "Node 20 actions deprecated" warning by running JS-based
# actions on Node 24 now (it becomes the default 2026-06-02).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install web deps
        run: npm install --prefix web

      - name: Build (with GH Pages base path)
        env:
          BASE_PATH: /mooncake-walkthrough/
        run: npm run build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
